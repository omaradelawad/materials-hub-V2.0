{#include layout}
    {#insert moreHeadings}
        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {/insert}

    <main class="min-h-screen flex items-center justify-center py-12 px-4 bg-slate-50/50">
        <div class="w-full max-w-[480px] fragment">
            
            <!-- Logo & Welcome Message -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-primary rounded-[2rem] text-white text-4xl shadow-xl shadow-primary/20 mb-6 animate-item">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-900 mb-2">أهلاً بك مجدداً! 👋</h1>
                <p class="text-slate-500 font-medium">سجل دخولك للوصول إلى كافة المحاضرات والمصادر</p>
            </div>

            <!-- Login Card -->
            <div class="bg-white rounded-[2.5rem] p-8 md:p-10 border border-slate-100 shadow-xl shadow-slate-200/50">
                <form class="space-y-6" action="j_security_check" method="POST">
                    
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-slate-700 mr-2">البريد الإلكتروني الجامعي</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <i class="fa-solid fa-envelope"></i>
                            </div>
                            <input type="text" 
                                   placeholder="username or email"
                                   class="w-full pr-11 pl-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-slate-800 font-medium"
                                   name="j_username"
                                   >
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-2">
                            <label class="block text-sm font-bold text-slate-700">كلمة المرور</label>
                            <a href="#" class="text-xs font-bold text-primary hover:underline">نسيت كلمة المرور؟</a>
                        </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <i class="fa-solid fa-lock"></i>
                            </div>
                            <input type="password" 
                                   placeholder="••••••••"
                                   class="w-full pr-11 pl-12 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-slate-800 font-medium"
                                   name="j_password"
                                   >
                            <button type="submit" class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 hover:text-slate-600">
                                <i class="fa-solid fa-eye-slash text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center px-2">
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox" class="hidden peer">
                            <div class="w-5 h-5 border-2 border-slate-200 rounded-md mr-2 peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center">
                                <i class="fa-solid fa-check text-[10px] text-white opacity-0 peer-checked:opacity-100"></i>
                            </div>
                            <span class="text-sm text-slate-500 font-medium group-hover:text-slate-700 transition-colors mr-2">تذكرني على هذا الجهاز</span>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="btn-press w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg hover:bg-primary transition-all shadow-lg shadow-slate-900/10 flex items-center justify-center gap-3 group">
                        تسجيل الدخول
                        <i class="fa-solid fa-arrow-left text-sm transform group-hover:-translate-x-1 transition-transform"></i>
                    </button>
                </form>


            </div>

            <!-- Sign Up Footer -->
            <p class="text-center mt-8 text-slate-500 font-medium">
                ليس لديك حساب؟ 
                <a href="/register" class="text-primary font-bold hover:underline">أنشئ حساباً جديداً</a>
            </p>

            <!-- Support Link -->
            <div class="mt-12 text-center">
                <a href="#" class="inline-flex items-center gap-2 text-xs text-slate-400 hover:text-primary transition-colors">
                    <i class="fa-solid fa-circle-question"></i>
                    تواجه مشكلة في الدخول؟ تواصل مع الدعم الفني
                </a>
            </div>
        </div>
    </main>
{/include}
